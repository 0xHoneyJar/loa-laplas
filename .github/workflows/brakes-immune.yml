name: brakes-immune

# The brakes-layer immune system as a standing gate. Born from the poteau forgeable-gate fix
# (#67/#68) and the GATE-HONESTY doctrine (grimoires/loa/doctrine/gate-honesty.md — the triad:
# unforgeable, exitable, truthful-state). Every push: the layer is swept for the forgeable-gate
# class (Form A agent-readable keys, Form B structure-only verify), and the poteau gate's own
# honesty is proven in all three directions — custody mint + signature verify (unforgeable), the
# honest-abort door (exitable), and 320 generated adversarial cases (the gate can't be made to
# lie no matter the input). Fully laplas-internal (the brakes files are all here), no siblings.

on:
  push:
  pull_request:

jobs:
  brakes-immune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Forgeable-gate scan (fail on A-class mint-residue)
        run: node scripts/brakes-forgeable-scan.mjs
      - name: Scanner teeth (planted Form-A gate must be caught)
        run: node --test scripts/brakes-forgeable-scan.test.mjs
      - name: poteau gate security tests (custody mint + signature verify — UNFORGEABLE)
        run: node --test poteau/bin/poteau-gatekeeper.security.test.mjs poteau/bin/poteau-verify-receipts.test.mjs
      - name: poteau honest-exit (the truthful abort door — EXITABLE)
        run: node --test poteau/bin/poteau-gatekeeper.honest-exit.test.mjs
      - name: poteau gate-honesty fuzzer (320 generated adversarial cases — the gate can't be made to lie)
        run: node --test poteau/bin/poteau-gatekeeper.fuzz.test.mjs
      - name: poteau arm-on-entry (no session armed to a run it never entered — TRUTHFUL-STATE)
        run: node --test poteau/hooks/prompt-arm.test.mjs

changelog:
  - "1.1.0 (2026-04-25): Add canonical thinking_effort spec for the composition tower. Enum: low | medium | high | xhigh | max. Per-stage hint for adaptive-thinking-capable runtimes (Opus 4.7, Opus 4.6, Sonnet 4.6); model-agnostic — runtimes translate via documented mapping (adaptive: effort param; manual: ~budget_tokens; no-thinking: ignored). Composition default = medium (iteration loop). Stage 1 (iterate-with-pixelmark) overrides to high for variation generation; stage 2 (curate) inherits medium; stage 3 (distill-component) overrides to high for productionization synthesis. Other compositions in the tower (ground-and-craft, triage-pause, hibernate-product, outage-triage) carry summary stubs pointing here. Per parallel cycle-002 followup pattern: canonical-in-one-place + stub-in-others."
  - "1.0.0 (2026-04-25): First canonical spec. Extracts the artisan ↔ pixelmark ↔ curate ↔ distill loop from ground-and-craft v1.0.0 stages 7–9. Becomes the single-source iteration primitive that ground-and-craft v1.1.0, triage-pause v1.7.0, and (eventually) direct-render invoke rather than each duplicating capture_method scaffolding. Wires PixelMark with explicit port-acceptance criteria and design-system-first language baked into stage 1 notes."

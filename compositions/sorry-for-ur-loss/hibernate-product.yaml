operator_note: |
  Authored from the henlo-monorepo cycle-002 hibernation workflow
  (sessions 1+2, 2026-04-25). Cycle-002 is the canonical evidence —
  what started as "the tetris is 500ing" ended with the operator
  detaching Henlo from CubQuests, dispositioning 8+ surfaces across
  the six-value rubric, swapping lobby chrome to after-hours copy,
  and arming an M+1 audit (trig_0149DMELqBQksfK29Y7Bdigd) for state
  drift detection.

  Three principles worth carrying forward:

  1. HIBERNATION IS A TRUST SIGNAL, NOT A TECH PROBLEM. The operator's
     framing was load-bearing: "people see this place is gracefully
     closed. The lights are still on. Someone is here, the bricks are
     at rest, the moondust is settling, and the doors that still work
     are clearly labeled." That sentence is the entire intent of this
     composition. Every disposition decision should serve it.

  2. THE SIX-VALUE DISPOSITION RUBRIC IS LOAD-BEARING. The four-value
     userImpact taxonomy from feature-flags-schema covers operational
     state, but hibernation needs two more values: migrate-then-park
     (the upstream is in flight, don't burn design effort) and
     wait-for-decision (the operator hasn't decided, don't force a
     premature call). Four values undercounts; eight overcounts. Six
     is what the cycle-002 disposition table converged on after a
     full operator walkthrough.

  3. CHROME STAYS FULL OR THE ROOM STOPS BEING THE ROOM. The reflexive
     move when N surfaces disable is "hide more chrome to make it look
     less broken." That's wrong — an arcade with the lights off isn't
     an arcade, it's a parking lot. Hybrid chrome (full structure,
     swapped content) preserves the world's volume while letting every
     surface speak the same after-hours language.

  hibernate-product is the meta-meta-composition. outage-triage routes
  per-bug; hibernate-product routes per-product. The two compose
  symmetrically: an outage discovered mid-hibernation routes back
  through outage-triage; a hibernation discovered mid-outage (the
  cycle-002 case) escalates from outage-triage to hibernate-product.
  Both compositions live in sorry-for-ur-loss because both are
  bedside-manner work — they make the user-facing surface honest about
  what's broken without scaring the user.

  The closing intent line, distilled from the operator's session-2
  kickoff: the lights are still on; the doors that still work are
  clearly labeled.


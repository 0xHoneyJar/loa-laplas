operator_note: |
  Authored 2026-04-27 alongside fix-sprint. These are the migrate-vs-fix
  siblings under outage-triage. The composition's reference instance
  is the in-flight Supabase `gcdudoqizygzkmiiktwt` → `freeside`
  cutover, with the Dynamic V2-EOL Aug-1 wallet migration as a parallel
  forcing function.

  Three principles worth carrying forward:

  1. THE PLAN IS THE WORK — the diffs follow. fix-sprint's load-bearing
     stage is armor authoring; this composition's load-bearing stage
     is the cutover plan. A sloppy plan produces N sloppy phases that
     each need re-review. Invest in stage 4. FAGAN's job at stage 5
     is not "is the plan clear?" — it's "argue why this plan loses
     state, breaks invariants, or strands consumers mid-cutover."

  2. THE CUTOVER GATE IS UNIVERSAL. Stage 9 halts regardless of
     surface_class. Migrations affect state; state changes need
     explicit gating. CultureTech latitude does NOT extend to
     "skip the cutover gate because this is just a cosmetic
     project." A cosmetic project can have non-cosmetic state
     (Discord IDs, brand assets, user-uploaded gallery items).

  3. DECOMMISSION IS A SEPARATE WINDOW. The interval between cutover
     (stage 9) and decommission (stage 10) is the rollback window.
     Keep it open. Operators consistently underestimate how often
     they need to roll back; the cost of premature decommission is
     unrecoverable.

  This composition lives in compositions/sorry-for-ur-loss/ alongside
  fix-sprint (in-place patch), triage-pause (disable), and
  hibernate-product (full sunset). It is the migrate-disposition
  target. With this composition's authoring, all four exits from
  outage-triage's stage 4 disposition rubric have downstream
  compositions: disable → triage-pause; fix → fix-sprint; migrate →
  architecture-migration; remove → inline (no composition needed).


  - "1.2.0 (2026-04-25): Add canonical surface_class spec for the sorry-for-ur-loss tower. Enum: culturetech-loose | defi-strict | mixed | unspecified. Drives gating intensity, codex_mode default, iteration_cap enforcement, and inline_fix permission across triage-pause, hibernate-product, and ground-and-craft (which carry summary stubs pointing here). Inferred at stage 1 from codebase signals; operator confirmation required for any non-unspecified class. Defaults to defi-strict on unspecified for safety."
  - "1.1.0 (2026-04-25): Add stage 1 verify-identifiers sub-step (URL/deployment-ID/commit-hash/env-var probe-before-propagate, with cycle-002 f31df80 trap citation). Add stage 3 codex_mode enum (delegation | pair-program; default delegation). Add session-{N+1}-kickoff.md to outputs[] with emit_when predicate. Add hibernate-product cross-reference (upstream when full-product sunsetting). Add outage-triage ↔ hibernate-product symmetric composition note. Authored from henlo-monorepo cycle-002 hibernation."
  - "1.0.0 (2026-04-25): First canonical spec. Captures the meta-workflow operator ran by hand for the henlo bug-001 (tetris 500 → 8 affected surfaces). Routes to triage-pause for disables; flags fix-sprint and architecture-migration as future downstream compositions."

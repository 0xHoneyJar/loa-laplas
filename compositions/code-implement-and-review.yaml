# Composition · code-implement-and-review
# ================================================================
# Implementer ↔ reviewer loop. general-purpose ships a diff, fagan
# (FAGAN) audits it, returns line-anchored findings with executable
# fixes, implementer applies fixes, reviewer re-reads, converges.
# Operator gets reviewed code, not raw output.
#
# Authored 2026-04-26 from the henlo-monorepo perf pass aftermath:
# yesterday's codex-rescue (retired) session shipped real changes with no
# adversarial review gate. This composition fills the gap. fagan
# (FAGAN) is a NEW lean construct that occupies a clean responsibility
# seam below Flatline (which owns PRD/SDD/Sprint review).
#
# See also: grimoires/loa/specs/arch-codex-review.md (loa-constructs)
# ================================================================

schema_version: "1.0"
kind: workflow
name: code-implement-and-review
description: >
  Implement code changes, then run adversarial code review against the
  diff. Iterate until reviewer approves or max 3 iterations reached.

intent: >
  "Operator delegates a coding task. Implementer ships a diff. Reviewer
   runs FAGAN over it, returns line-anchored findings with executable
   fixes. Implementer applies fixes. Reviewer re-reads, converges.
   Operator gets reviewed code, not raw output."

backend: headless-tmux

hivemind_labels:
  product_area: "Engineering — composable code review for delivery compositions"
  workstream: delivery
  priority: high
  jtbd:
    category: personal
    description: "Reassure Me This Is Safe — implementer output gets a strict gate before reaching prod"
  source: team-internal

depends_on:
  constructs:
    - fagan               # FAGAN — the lean reviewer. renamed from: codex-review (bd-ii1m);
                          # implementer is the built-in general-purpose passthrough, not a registry construct
  tools:
    - codex               # codex CLI (gpt-5.5 backend by default); both stages depend on it
  upstream_compositions:
    - compositions/discovery/audit-feel.yaml   # MAY produce findings that motivate a code-implement-and-review pass
  registry_entries:
    - fagan: https://github.com/0xHoneyJar/loa-constructs/blob/main/registry.yaml

inputs:
  - type: Intent
    name: task
    description: What the operator wants implemented
    required: true
  - type: Artifact
    name: scope
    description: Files / modules to limit changes to (avoid scope creep)
    required: false
  - type: Operator-Model
    name: operator_context
    required: false

# Implement ↔ review loop. Stage 1 emits Diff; stage 2 reads Diff and
# emits Verdict; if Verdict is CHANGES_REQUIRED and iteration < cap,
# loop back to stage 1 with the Verdict as input.
iterate:
  - [1, 2]

# cycle-053 (vendored into construct-rooms-substrate 2026-05-31): the upstream
# composition relied on the runner default cap (CODEX_REVIEW_MAX_ITERATIONS=3).
# The host composition schema (FR-7.2 / S0-T6) requires max_iterations +
# terminate_when whenever iterate[] is non-empty, so the "validate before spend"
# gate can settle the cap WITHOUT a runner-side default. Made explicit here.
max_iterations: 3
terminate_when: >
  Stage-2 (fagan / FAGAN) Verdict is APPROVED on merit. If the cap is
  reached first the reviewer auto-approves at the wrapper level — that is
  cap_reached (auto_approved_at_cap), surfaced at the operator seam, NEVER
  folded into converged.

# ================================================================
# DAG fan-out (RFC #35) — the SPEED shape (compose-speed S2, 2026-06-13)
# ================================================================
# This composition is RFC-#35-capable: the iterate pair [[1,2]] has EXACTLY ONE
# work stage (stage 1 implement, role: primary) and one gate (stage 2 review,
# role: craft-gate), satisfying the emitter's dag_capable check (len(work_stages)
# == 1, segment-emitter.py:953). The runtime ALREADY bakes the fan-out machinery
# into every emitted segment (TIER_MODEL_JS, leafModel||"sonnet", dagWaves,
# boundedParallel) — no runtime change is needed to go fast.
#
# To go FAST, the /compose driver SHOULD resolve the operator's task into
# independent work items and pass them as args.items[]. NOTE (honest, audit
# 2026-06-13): nothing AUTO-decomposes today — neither the emitter nor the
# /compose skill derives items[]; the driver (operator or agent) supplies them.
# With no items[], this runs the single-context path (same as before). The
# fan-out is a CAPABILITY here, not automatic default behavior. Shape:
#   args.items = [{ id, task, depends_on?, intelligence_tier?, isolation? }]
# Iteration 1 fans those items across cheap-tier (sonnet) leaves in Kahn waves;
# the opus FAGAN gate reviews the MERGED diff ONCE per convergence cycle (the loop
# wraps WAVES, not items — gate cost ~1x/cycle, never Nx). Leaves default to
# sonnet unless an item declares its own intelligence_tier (reserve 'deep' for
# genuinely hard items). A task with NO items[] runs the single-context
# implement->gate path unchanged — fan-out is OPT-IN, never forced.
#
# Decomposition heuristic (how the driver derives items[]): split along
# independent file/module/feature boundaries that share no mutable state; express
# ordering with depends_on (the wave scheduler honors it); keep each item a
# self-contained unit one sonnet worker can ship and the gate can anchor a finding
# to. The emitter is deterministic and never shells out to derive items — the
# EXECUTOR populates them (segment-emitter.py:949-950).
# (The fan-out contract is the COMMENT above — deliberately NOT a structured key:
#  the host composition schema is additionalProperties:false at the top level, so a
#  dag_fanout: key fails validate-before-spend. The declaration: capable=true,
#  work_stage=1 (role:primary), gate_stage=2 (role:craft-gate, opus, fires once),
#  leaf_tier=sonnet, backward-compatible with no items[]. The runtime carries the
#  machinery; this block documents the contract for the driver + the next maintainer.)

# ================================================================
# Stages
# ================================================================

chain:
  - stage: 1
    name: implement
    construct: general-purpose   # was codex-rescue (retired, not a construct); built-in implementer (bd-ii1m)
    skill: implement
    mode: persistent
    reads: [Intent, Artifact, Verdict]   # Verdict from previous review iteration
    writes: [Artifact, Signal]           # Diff + trajectory
    role: primary
    iterates_with: 2
    thinking_effort: high   # production code authoring is multi-step synthesis
    notes: >
      First iteration: implement against the operator's task within scope.
      Subsequent iterations: read the previous review Verdict, apply
      every finding's fixed_code, re-emit Diff. Don't introduce new
      changes outside of fix scope unless the fix requires them.

      On iteration 2+, the implementer MAY reject a finding with an
      explanation. The convergence prompt in stage 2 instructs FAGAN
      to accept reasonable explanations — operator context is fuller
      than the reviewer's diff-scoped view.

  - stage: 2
    name: review
    construct: fagan             # was codex-review (retired); FAGAN is the real reviewer construct (bd-ii1m)
    skill: reviewing-diffs
    persona: FAGAN
    mode: fresh                          # fresh context per iteration — no memory of previous reviews
    reads: [Artifact]                    # the diff
    writes: [Verdict, Signal]
    role: craft-gate
    iterates_with: 1
    thinking_effort: high   # bug-finding + fix-authoring is multi-step synthesis
    notes: >
      Stage 1 emits Diff; this stage runs codex-review-api.sh review-diff
      against it. Returns structured JSON Verdict (APPROVED |
      CHANGES_REQUIRED + findings[]). On APPROVED, composition completes.
      On CHANGES_REQUIRED, loop back to stage 1 with findings as context.

      Iteration cap: 3 total reviews (CODEX_REVIEW_MAX_ITERATIONS).
      Past the cap, the reviewer's API auto-approves at the wrapper
      level — Verdict carries `auto_approved: true` and
      `note: "iteration-cap-reached"`. Surface this back to the
      operator on completion; do not silently treat as a clean approval.

# ================================================================

outputs:
  - type: Artifact
    destination: <repo>/<changed-files>
    description: The implemented + reviewed code changes
    hivemind_labels:
      artifact_type: product-spec
      learning_status: strongly-validated
  - type: Verdict
    destination: .run/compose/<run_id>/fagan-trail.jsonl
    description: Per-iteration review verdicts + findings
    schema: https://raw.githubusercontent.com/0xHoneyJar/construct-fagan/main/schemas/codex-review-finding.schema.json
  - type: Signal
    destination: .run/compose/<run_id>/orchestrator.jsonl
    description: Orchestrator trajectory (stage transitions, iteration counts)

compose_with:
  - general-purpose
  - fagan

composes_symmetrically_with:
  - general-purpose ↔ fagan   # implement ↔ review — the load-bearing pair

# ================================================================
# Surface Class (canonical def in outage-triage.yaml; stub here)
# ================================================================

surface_class:
  default: unspecified
  enum: [culturetech-loose, defi-strict, mixed, unspecified]
  canonical_definition: compositions/sorry-for-ur-loss/outage-triage.yaml#surface_class
  affects_in_this_composition:
    - iteration cap — advisory on culturetech-loose (operator halts dictate progress); enforced (default 3) on defi-strict
    - severity threshold — major-only review on culturetech-loose; both major and critical surfaced on defi-strict
    - auto-approval handling — surfaced as warning to operator on culturetech-loose; surfaced as halt-for-confirmation on defi-strict
  inferred_when_unspecified: defi-strict (safety default)

# ================================================================
# Thinking Effort (canonical def in feel-iterate.yaml; stub here)
# ================================================================

thinking_effort:
  default: high
  canonical_definition: compositions/delivery/feel-iterate.yaml#thinking_effort
  rationale: |
    Both stages are multi-step synthesis — stage 1 authors production
    code, stage 2 finds bugs AND writes the fixes. Lean default.
  affects_in_this_composition:
    - stage 1 implement — high (production code authoring); steers down to medium when applying explicit findings on iteration 2+
    - stage 2 review — high (bug-finding + fix-authoring); steers down to medium on iteration 2+ where the convergence prompt narrows scope to verification

# ================================================================

invocation_examples:
  - operator_utterance: "implement the perf pass and review it"
    resolves_to: full chain stages 1-2 with iteration loop
  - operator_utterance: "implement these 3 independent endpoints and review them"
    resolves_to: >
      DAG fan-out (RFC #35) — driver resolves
      args.items=[{id:'ep-a',task:...},{id:'ep-b',task:...},{id:'ep-c',task:...}];
      iteration 1 fans 3 sonnet leaves in one Kahn wave; the opus FAGAN gate
      reviews the merged diff ONCE, anchoring findings to [ep-a|ep-b|ep-c]
  - operator_utterance: "review this diff"
    resolves_to: stage 2 only with operator-supplied Diff Artifact
  - operator_utterance: "skip review, just implement"
    resolves_to: stage 1 only (operator opts out of gate — surface as warning)
  - operator_utterance: "FAGAN this PR before I merge"
    resolves_to: stage 2 only with diff resolved from current PR via gh pr diff

# ================================================================

when_to_use: >
  - Implementer just shipped code (perf pass, refactor, feature)
  - Pre-merge gate on a PR diff
  - Any composition where "implement then verify" is the shape
  - NOT for PRD/SDD/Sprint review (use Flatline Protocol)
  - NOT for UI feel iteration (use feel-iterate)
  - NOT for architecture audits (use audit-feel or other audit-pair compositions)

# ================================================================

known_limitations:
  - "Iteration cap of 3 is advisory on culturetech-loose surfaces (operator halts dictate progress); enforced on defi-strict per surface_class. The reviewer's API auto-approves past the cap — Verdict carries `auto_approved: true` and the orchestrator MUST surface this rather than treating as clean approval."
  - "Reviewer has no memory of previous reviews (mode: fresh per iteration). Convergence relies on the re-review prompt's discipline. If the reviewer keeps finding NEW issues post-iteration-1, that's a prompt drift bug — file against construct-fagan."
  - "Stage 1 runs the built-in Claude general-purpose implementer (the codex CLI is the documented alternative — wiring it requires emitter support). The composition is structured so the implementer is replaceable; the reviewer is not."
  - "Out of scope for this composition: lint, type-check, test execution. The implementer is expected to run those itself before emitting Diff. The reviewer reads Diff content; it does not orchestrate the test runner."
  - "Diff size is bounded by CODEX_REVIEW_MAX_TOKENS (default 30000). For very large diffs, the reviewer's `prepare_content` truncates with priority sort (P0 security/.claude/ first, P3 docs/tests last). Operator should be aware that large diffs may not be reviewed in full."

# ================================================================

references:
  - skill_implement: built-in `general-purpose` agent passthrough (bd-ii1m) — no SKILL.md; replaced codex-rescue (retired)
  - skill_reviewing_diffs: construct-fagan/skills/reviewing-diffs/SKILL.md
  - skill_reviewing_files: construct-fagan/skills/reviewing-files/SKILL.md
  - schema_review_finding: https://raw.githubusercontent.com/0xHoneyJar/construct-fagan/main/schemas/codex-review-finding.schema.json
  - construct_fagan_repo: https://github.com/0xHoneyJar/construct-fagan   # renamed from: construct-codex-review
  - arch_spec: loa-constructs/grimoires/loa/specs/arch-codex-review.md   # pre-rename filename — spec not renamed (BB F-005: file verified on disk)
  - companion_implementer_alternative: codex CLI direct (no MCP plugin) — V2 work, see arch spec build sequence

# ================================================================

operator_note: |
  Authored 2026-04-26. Why this composition exists: yesterday's
  henlo-monorepo perf pass via codex-rescue had no adversarial review
  gate. The diff went straight from implementer to operator. This is
  the gap-shaped composition that fills it.

  Three principles worth carrying forward:

  1. THE LOOP IS THE WORK. Stages 1↔2 are where bugs get caught and
     fixed. Don't pad with type-check / lint / test-run stages — those
     are the implementer's job before emitting Diff. The reviewer's job
     is bugs the implementer missed AND security holes the implementer
     wouldn't think to look for. Auto-approval past iteration cap is a
     SIGNAL not a SUCCESS — surface it.

  2. CLEAR BOUNDARY FROM FLATLINE. Flatline reviews planning artifacts
     (PRD/SDD/Sprint) with multi-persona scored arbitration. This
     composition reviews CODE with single-persona structured findings.
     Different surface, different cadence, different output shape. Do
     not muddle.

  3. SCHEMA IS THE BRIDGE. The reviewer emits JSON conforming to a
     published schema (see references). The implementer reads that JSON
     to apply fixes. The operator can read the trail file and verify
     what was caught. The schema is the contract — when in doubt,
     look at the schema, not the prose.

  This composition lives in compositions/delivery/ alongside
  ground-and-craft, feel-iterate, and direct-render. The
  implement-and-review pair is the codework analogue of feel-iterate's
  feelwork pair (artisan ↔ the-mint).

# ================================================================

version: "1.0.0"
authored_at: "2026-04-26"
authored_by: kickoff session 2 — codex-review build (construct since renamed fagan)
changelog:
  - "1.0.0 (2026-04-26): Initial canonical spec. Pairs codex-rescue (Anthropic codex MCP implementer) with codex-review (FAGAN reviewer) in an iterate [[1,2]] loop. Inherits convergence discipline from the reviewer's re-review prompt; iteration cap default 3, surfaced auto-approval past cap. Surface_class + thinking_effort use stub-pointing pattern (canonical defs live in outage-triage.yaml and feel-iterate.yaml respectively)."

  - first_instance_pr_deploy: "0xHoneyJar/construct-mibera-codex#69/#70/#71 — deploy unblock arc"
  - first_instance_issue: "0xHoneyJar/freeside-characters#20 — 4 KEEPER capture comments (env-aware-composition + voice-truth candidates)"

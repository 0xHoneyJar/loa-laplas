# Fidelity Relay — RFC #237 reference composition
#
# Cycle: cycle-craft-cluster (simstim-20260511-craftc1c5), Sprint 3, task C.2
# SDD: §2.1.4
#
# The fidelity audit shape: artisan inscribes the taste intent, crucible
# checks shipped reality against it, artisan confirms whether the diff is
# intentional or fix-required. Same construct appears at stages 0 and 2 —
# this is the canonical "declare → inspect → confirm" rhythm.
schema_version: 1
pattern: pair-relay
artifact_name: fidelity-audit-verdict
sequence:
  - construct: artisan
    role: declare-taste     # DECLARE — ALEXANDER inscribes the taste spec being audited against (the ground truth the diff is measured from)
    persona: ALEXANDER
  - construct: crucible
    role: validate-shipped  # INSPECT — crucible compares the shipped surface to the declared taste and reports each concrete divergence
    persona: null
  - construct: artisan
    role: confirm-intent    # CONFIRM — ALEXANDER rules each divergence intentional-as-shipped or a fix-required regression
    persona: ALEXANDER
max_cycles: 3
surface_mode: summary
domain: fidelity
convergence_criteria: >
  artisan's final-cycle verdict resolves EVERY divergence crucible found between
  declared taste and shipped reality into exactly one of: acknowledged-as-intentional
  (with why it is acceptable) or accepted-as-fix-required (with what must change). No
  divergence left in limbo; the operator accepts that verdict.

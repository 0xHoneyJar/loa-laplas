# Access Relay — RFC #236 reference composition
#
# Cycle: cycle-craft-cluster (simstim-20260511-craftc1c5), Sprint 3, task C.3
# SDD: §2.1.4
#
# The accessibility audit shape: kansei (feel) names interaction-feel gaps
# that exclude users; artisan adjusts taste tokens / motion physics / contrast
# in response; kansei validates that the response actually works for the
# excluded.
#
# Sprint D NOTE (per SDD §2.1.4): if this kansei-artisan-kansei loop proves
# insufficient at rehearsal, the operator may explore a variant
# `kansei → crucible → kansei` triple-relay instead. The synthesis verdict
# for the access lane (Sprint E) documents which form was actually needed.
schema_version: 1
pattern: pair-relay
artifact_name: accessibility-decision
sequence:
  - construct: kansei
    role: name-exclusion     # INPUT — kansei names the interaction-feel gaps that exclude users: WHO is shut out and HOW, specific (not "needs a11y work")
    persona: null
  - construct: artisan
    role: respond-with-taste # RESPOND — artisan closes each named gap via taste tokens / motion physics / contrast; no free-form redesign beyond the gaps
    persona: ALEXANDER
  - construct: kansei
    role: validate-feel      # VERIFY — kansei checks the response actually works for the excluded; closes the gap or names what is still residual
    persona: null
max_cycles: 3
surface_mode: summary
domain: accessibility
convergence_criteria: >
  kansei's final-cycle envelope confirms the named exclusion gap is CLOSED for the
  excluded users — concretely (the contrast / motion / interaction fix works for
  them), not merely that artisan responded — OR explicitly names the residual gap
  and why this loop could not close it. "Looks better" is not convergence.

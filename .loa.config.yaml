# Loa Framework Configuration (Submodule Mode)
# This file is yours to customize - framework updates will never modify it

# Installation mode (DO NOT CHANGE - use mount-loa.sh to switch to standard)
installation_mode: submodule

# Submodule settings
submodule:
  path: .loa
  # ref: main  # Uncomment to track specific ref

# =============================================================================
# Persistence Mode
# =============================================================================
persistence_mode: standard

# =============================================================================
# Integrity Enforcement
# =============================================================================
# Note: Submodule mode uses git submodule integrity instead of checksums
integrity_enforcement: warn

# =============================================================================
# Agent Configuration
# =============================================================================
disabled_agents: []

# =============================================================================
# Structured Memory
# =============================================================================
memory:
  notes_file: grimoires/loa/NOTES.md
  trajectory_dir: grimoires/loa/a2a/trajectory
  trajectory_retention_days: 30

# =============================================================================
# Context Hygiene
# =============================================================================
compaction:
  enabled: true
  threshold: 5

# =============================================================================
# Integrations
# =============================================================================
integrations:
  - github

# =============================================================================
# Run Mode (autonomous sprint execution)
# =============================================================================
run_mode:
  enabled: true
  defaults:
    max_cycles: 20
    timeout_hours: 8

# =============================================================================
# Flatline Protocol (multi-model adversarial review)
# =============================================================================
# Headless aliases for all three providers (proven config from loa-freeside,
# operator decision 2026-05-25): invokes claude/codex/gemini CLIs on the
# operator's session credentials — no API-key env vars needed.
flatline_protocol:
  enabled: true
  auto_trigger: true
  models:
    primary: "claude-headless"
    secondary: "codex-headless"
    tertiary: "gemini-headless"
  thresholds:
    high_consensus: 700
    dispute_delta: 300
    low_value: 400
    blocker: 700
  phases:
    prd: true
    sdd: true
    sprint: true
  budget:
    max_tokens_per_phase: 100000
    warn_at_percent: 80
    hard_limit_cents: 300
    block_on_exceed: false

# =============================================================================
# Simstim (HITL workflow orchestration)
# =============================================================================
simstim:
  enabled: true

# =============================================================================
# Model routing override (hounfour — Layer 2, deep-merged over .claude/defaults/model-config.yaml)
# =============================================================================
# Operator decision 2026-06-18: Claude Fable 5 is retired/unavailable. The
# System-zone default pins claude-headless to `extra.cli_model: fable` (set
# 2026-06-10), so every headless dispatch ran `claude --model fable` → "Fable 5
# is currently unavailable" → cheval circuit breaker (anthropic/headless) tripped
# OPEN → Flatline got no claude voice. Re-pin to `opus` (the claude CLI alias for
# the latest Opus = 4.8) WITHOUT editing the System-zone default.
hounfour:
  providers:
    anthropic:
      models:
        claude-headless:
          extra:
            cli_model: opus
